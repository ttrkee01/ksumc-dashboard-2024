<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSUMC — لوحة الأداء التشغيلي 2026</title>

<!-- Chart.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

<!-- Font -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ======================= STYLE ======================= */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Cairo',sans-serif;background:#f4f5f7;color:#1a1a1a;direction:rtl}
.header{background:#0084BD;color:#fff;padding:14px 22px;display:flex;justify-content:space-between;align-items:center}
.abtn{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);color:#fff;padding:7px 14px;border-radius:18px;font-weight:600;cursor:pointer}
.main{padding:22px;max-width:1200px;margin:auto}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:#fff;border-radius:10px;padding:16px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.kpi-lbl{font-size:12px;color:#4a5568}
.kpi-val{font-size:32px;font-weight:800;color:#0084BD}
.card{background:#fff;border-radius:10px;padding:18px;box-shadow:0 2px 6px rgba(0,0,0,.08);margin-bottom:14px}
.ct{font-weight:700;margin-bottom:10px}

.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);align-items:center;justify-content:center}
.modal-ov.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:22px;width:min(700px,95vw)}
.mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.mf label{font-size:11px;color:#444}
.mf input{padding:6px;border:1px solid #ccc;border-radius:6px;text-align:center}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
background:#0084BD;color:#fff;padding:8px 20px;border-radius:20px;
opacity:0;transition:.3s}
.toast.show{opacity:1}
</style>
</head>

<body>

<header class="header">
  <div>🏥 المدينة الطبية الجامعية — جامعة الملك سعود</div>
  <div>
    <button class="abtn" onclick="adminLogin()">🔐 دخول الأدمن</button>
    <button class="abtn" id="editBtn" onclick="openEditor()" style="display:none">✏️ تعديل البيانات</button>
    <button class="abtn" onclick="exportCSV()">📥 CSV</button>
    <button class="abtn" onclick="window.print()">🖨️ طباعة</button>
  </div>
</header>

<div class="main">

  <div class="kpi-grid">
    <div class="kpi"><div class="kpi-lbl">إجمالي الحالات الحرجة</div><div id="kv1" class="kpi-val">0</div></div>
    <div class="kpi"><div class="kpi-lbl">النقل الطبي</div><div id="kv2" class="kpi-val">0</div></div>
    <div class="kpi"><div class="kpi-lbl">البرامج التدريبية</div><div id="kv3" class="kpi-val">0</div></div>
    <div class="kpi"><div class="kpi-lbl">المشاركات</div><div id="kv4" class="kpi-val">0</div></div>
  </div>

  <div class="card">
    <div class="ct">الأداء الشهري</div>
    <canvas id="c1" height="140"></canvas>
  </div>

</div>

<!-- Editor -->
<div class="modal-ov" id="emod">
  <div class="modal">
    <div class="ct">تعديل الحالات الشهرية</div>
    <div class="mgrid" id="minp"></div><br>
    <button class="abtn" onclick="closeEd()">إلغاء</button>
    <button class="abtn" onclick="applyData()">✅ تطبيق</button>
  </div>
</div>

<div class="toast" id="toast">تم</div>

<script>
/* ======================= DATA ======================= */
const MN=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
let D=[50,66,77,90,70,40,60,80,55,50,67,90];
let chart;

/* ======================= ADMIN ======================= */
const ADMIN_PASSWORD="KSUMC2026";
function isAdmin(){return sessionStorage.getItem("admin")==="true";}
function adminLogin(){
  const p=prompt("أدخل كلمة مرور الأدمن:");
  if(p===ADMIN_PASSWORD){
    sessionStorage.setItem("admin","true");
    alert("✅ تم الدخول كأدمن");
    location.reload();
  }else alert("❌ كلمة المرور غير صحيحة");
}

/* ======================= INIT ======================= */
window.addEventListener("DOMContentLoaded",()=>{
  if(isAdmin()) document.getElementById("editBtn").style.display="inline-block";
  render();
});

/* ======================= RENDER ======================= */
function render(){
  const tot=D.reduce((a,b)=>a+b,0);
  kv1.textContent=tot;
  kv2.textContent=tot;
  kv3.textContent=tot;
  kv4.textContent=tot*2;

  if(chart) chart.destroy();
  chart=new Chart(c1,{
    type:'bar',
    data:{labels:MN,datasets:[{data:D,backgroundColor:'#0084BD'}]},
    options:{responsive:true,maintainAspectRatio:false}
  });
}

/* ======================= EDIT ======================= */
function openEditor(){
  minp.innerHTML=MN.map((m,i)=>`
    <div class="mf">
      <label>${m}</label>
      <input type="number" id="in${i}" value="${D[i]}">
    </div>`).join('');
  emod.classList.add("open");
}
function closeEd(){emod.classList.remove("open");}
function applyData(){
  D=D.map((_,i)=>parseInt(document.getElementById("in"+i).value)||0);
  closeEd();render();toast("✅ تم التحديث");
}

/* ======================= UTILS ======================= */
function exportCSV(){
  const rows=[['الشهر','الحالات'],...D.map((v,i)=>[MN[i],v])];
  const a=document.createElement("a");
  a.href="data:text/csv;charset=utf-8,\uFEFF"+rows.map(r=>r.join(',')).join('\n');
  a.download="KSUMC_2026.csv";
  a.click();
}
function toast(m){
  const t=document.getElementById("toast");
  t.textContent=m;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);
}
</script>

</body>
</html>
