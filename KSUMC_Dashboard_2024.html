<script>
/* ===================== ثوابت ===================== */
const MN=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const QN=['الربع الأول','الربع الثاني','الربع الثالث','الربع الرابع'];
const QC=['#0084BD','#005f8a','#3BAAD4','#748995'];
const BC=[...Array(3).fill('#0084BD'),...Array(3).fill('#005f8a'),...Array(3).fill('#3BAAD4'),...Array(3).fill('#748995')];

/* ===================== البيانات ===================== */
// حالات طارئة منقولة
let D_T = [30,40,45,55,40,20,35,50,30,28,38,55];

// حالات طارئة غير منقولة
let D_N = [20,26,32,35,30,20,25,30,25,22,29,35];

// الإجمالي
let D = D_T.map((v,i)=>v + D_N[i]);

const CHS={};

/* ===================== أدوات الرسم ===================== */
const BASE={
  responsive:true,
  maintainAspectRatio:false,
  plugins:{legend:{display:false}},
  scales:{
    x:{ticks:{font:{family:'Cairo',size:10}}},
    y:{beginAtZero:true,ticks:{font:{family:'Cairo',size:10}}}
  }
};

function dc(id){ if(CHS[id]){CHS[id].destroy(); delete CHS[id]; } }
function mk(id,cfg){ dc(id); CHS[id]=new Chart(document.getElementById(id),cfg); }

function ma(a,w){
  return a.map((_,i)=>{
    const s=a.slice(Math.max(0,i-1),i+2);
    return Math.round(s.reduce((x,y)=>x+y,0)/s.length);
  });
}

/* ===================== العرض ===================== */
function renderMainCharts(){
  // الرسم المكدس (منقولة / غير منقولة)
  mk('c1',{
    type:'bar',
    data:{
      labels:MN,
      datasets:[
        {label:'طارئة منقولة',data:D_T,backgroundColor:'#0084BD'},
        {label:'طارئة غير منقولة',data:D_N,backgroundColor:'#E35D6A'}
      ]
    },
    options:{
      ...BASE,
      plugins:{legend:{display:true}},
      scales:{x:{stacked:true},y:{stacked:true}}
    }
  });
}

function renderAll(){
  const qt=[
    D.slice(0,3).reduce((a,b)=>a+b,0),
    D.slice(3,6).reduce((a,b)=>a+b,0),
    D.slice(6,9).reduce((a,b)=>a+b,0),
    D.slice(9,12).reduce((a,b)=>a+b,0)
  ];
  const tot=qt.reduce((a,b)=>a+b,0);

  document.getElementById('kv1').textContent=tot.toLocaleString();

  D.forEach((v,i)=>{
    const el=document.getElementById('md'+i);
    if(el) el.textContent=v;
  });

  renderMainCharts();
}

/* ===================== محرر الأدمن ===================== */
function openEditor(){
  document.getElementById('minp').innerHTML = MN.map((m,i)=>`
    <div class="mf"><label>${m} — منقولة</label><input id="inT${i}" type="number" value="${D_T[i]}"></div>
    <div class="mf"><label>${m} — غير منقولة</label><input id="inN${i}" type="number" value="${D_N[i]}"></div>
  `).join('');
  document.getElementById('emod').classList.add('open');
}

function closeEd(){ document.getElementById('emod').classList.remove('open'); }

function applyData(){
  D_T=D_T.map((_,i)=>+document.getElementById('inT'+i).value||0);
  D_N=D_N.map((_,i)=>+document.getElementById('inN'+i).value||0);
  D=D_T.map((v,i)=>v+D_N[i]);
  closeEd();
  renderAll();
}

/* ===================== تحميل ===================== */
window.addEventListener('DOMContentLoaded',renderAll);
</script>
